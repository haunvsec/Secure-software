<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Secure Software Board{% endblock %}</title>

  <!-- Bootstrap 5 CSS -->
  <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="{{ url_for('static', filename='css/bootstrap-icons.min.css') }}" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

  {% block head %}{% endblock %}
</head>
<body>

  <!-- Top Navbar (visible on all screens, hamburger on mobile) -->
  <nav class="navbar navbar-dark bg-dark-blue d-md-none sticky-top">
    <div class="container-fluid">
      <button class="navbar-toggler border-0" type="button"
              data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar"
              aria-controls="mobileSidebar" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a class="navbar-brand" href="/">
        <i class="bi bi-shield-lock-fill me-1"></i> Secure Software Board
      </a>
      <a href="/search" class="btn btn-outline-light btn-sm">
        <i class="bi bi-search"></i>
      </a>
    </div>
  </nav>

  <!-- Mobile Offcanvas Sidebar (< 768px) -->
  <div class="offcanvas offcanvas-start bg-dark-blue text-white d-md-none" tabindex="-1"
       id="mobileSidebar" aria-labelledby="mobileSidebarLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="mobileSidebarLabel">
        <i class="bi bi-shield-lock-fill me-2"></i>Secure Software Board
      </h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body p-0">
      {% include 'components/sidebar.html' %}
    </div>
  </div>

  <!-- Main Layout -->
  <div class="d-flex">
    <!-- Desktop Sidebar (>= 768px) -->
    <div class="d-none d-md-flex">
      {% include 'components/sidebar.html' %}
    </div>

    <!-- Content Area -->
    <main class="flex-grow-1 p-4 content-area">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
