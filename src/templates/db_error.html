<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Error — Secure Software Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-danger">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0">Database Error</h4>
                    </div>
                    <div class="card-body">
                        <p class="card-text">
                            The CVE database file could not be found or is not accessible.
                            Please ensure <code>cve_database.db</code> exists in the application directory.
                        </p>
                        <p class="text-muted">{{ error }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
