version: '3.8'

services:
  app:
    build: .
    container_name: ssb-app
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER:-cvedb}:${DB_PASSWORD:-cvedb}@db:3306/${DB_NAME:-cve_database}?charset=utf8mb4
      CVE_REPO_PATH: /app/data/cvelistV5
      ADVISORY_REPO_PATH: /app/data/security-advisory-db
      SYNC_INTERVAL_HOURS: ${SYNC_INTERVAL_HOURS:-1}
      DISABLE_SCHEDULER: ${DISABLE_SCHEDULER:-false}
    ports:
      - "${APP_PORT:-5005}:5000"
    volumes:
      - sync_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ssb-net

  db:
    image: mariadb:11
    container_name: ssb-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${DB_NAME:-cve_database}
      MARIADB_USER: ${DB_USER:-cvedb}
      MARIADB_PASSWORD: ${DB_PASSWORD:-cvedb}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    command: >
      --innodb-buffer-pool-size=1536M
      --innodb-log-file-size=256M
      --innodb-log-buffer-size=64M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --innodb-io-capacity=1000
      --innodb-io-capacity-max=2000
      --innodb-read-io-threads=8
      --innodb-write-io-threads=4
      --join-buffer-size=2M
      --sort-buffer-size=4M
      --read-buffer-size=1M
      --read-rnd-buffer-size=1M
      --tmp-table-size=64M
      --max-heap-table-size=64M
      --max-connections=100
      --thread-cache-size=16
      --table-open-cache=4000
      --table-definition-cache=2000
      --max-allowed-packet=64M
      --performance-schema=OFF
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ssb-net

volumes:
  mariadb_data:
  sync_data:

networks:
  ssb-net:
    driver: bridge
