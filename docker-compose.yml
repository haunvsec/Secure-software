version: '3.8'

services:
  app:
    build: .
    container_name: ssb-app
    restart: unless-stopped
    environment:
      DB_TYPE: ${DB_TYPE:-sqlite}
      SQLITE_PATH: /app/cve_database.db
      CVE_REPO_PATH: /app/data/cvelistV5
      ADVISORY_REPO_PATH: /app/data/security-advisory-db
      SYNC_INTERVAL_HOURS: ${SYNC_INTERVAL_HOURS:-1}
      # MariaDB settings (when DB_TYPE=mysql)
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-cvedb}
      DB_PASSWORD: ${DB_PASSWORD:-cvedb}
      DB_NAME: ${DB_NAME:-cve_database}
    ports:
      - "${APP_PORT:-5005}:5000"
    volumes:
      - sync_data:/app/data
    networks:
      - ssb-net

  db:
    image: mariadb:11
    container_name: ssb-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${DB_NAME:-cve_database}
      MARIADB_USER: ${DB_USER:-cvedb}
      MARIADB_PASSWORD: ${DB_PASSWORD:-cvedb}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./scripts/create_mysql_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ssb-net
    profiles:
      - mysql

volumes:
  mariadb_data:
  sync_data:

networks:
  ssb-net:
    driver: bridge
